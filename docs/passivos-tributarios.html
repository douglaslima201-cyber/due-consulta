<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Passivos Tributários — Rumo Brasil</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060D1A;--bg2:#0C1625;--bg3:#122035;--bg4:#1A2E48;--bg5:#243D5E;
  --acc:#0D9488;--acc2:#14B8A6;--acc3:#0F766E;
  --orange:#F97316;--red:#EF4444;--yellow:#F59E0B;--green:#22C55E;--blue:#3B82F6;
  --white:#FFFFFF;--g1:#E8EDF5;--g2:#A8B8CC;--g3:#6B7D94;--g4:#3D5068;
  --sw:240px;--th:60px;--r:8px;--r2:12px;--r3:16px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{height:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--white);height:100%;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(13,148,136,.3);border-radius:2px;}

/* LAYOUT */
#app{display:flex;height:100vh;}
#sidebar{width:var(--sw);flex-shrink:0;background:var(--bg2);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;overflow-y:auto;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:var(--th);flex-shrink:0;background:rgba(6,13,26,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 24px;gap:12px;}
#content{flex:1;overflow-y:auto;padding:24px;}

/* SIDEBAR */
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--acc3));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sb-logo-name{font-size:13px;font-weight:700;letter-spacing:-.01em;line-height:1.2;}
.sb-logo-name small{display:block;font-size:10px;font-weight:400;color:var(--g3);font-family:var(--mono);}
.sb-section{padding:14px 16px 4px;font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--g4);}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 8px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--g2);cursor:pointer;transition:all .15s;text-decoration:none;border:none;background:none;width:calc(100% - 16px);text-align:left;}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--white);}
.sb-item.active{background:rgba(13,148,136,.12);color:var(--acc2);border:1px solid rgba(13,148,136,.2);}
.sb-ic{font-size:15px;flex-shrink:0;width:20px;text-align:center;}
.sb-spacer{flex:1;}
.sb-bottom{padding:12px;border-top:1px solid rgba(255,255,255,.06);}
.sb-back{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r);font-size:12px;color:var(--g3);cursor:pointer;transition:all .15s;text-decoration:none;}
.sb-back:hover{color:var(--g2);background:rgba(255,255,255,.04);}

/* TOPBAR */
.tb-breadcrumb{font-size:13px;color:var(--g3);}
.tb-breadcrumb span{color:var(--white);font-weight:600;}
.tb-spacer{flex:1;}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .2s;white-space:nowrap;}
.tb-btn-p{background:linear-gradient(135deg,var(--acc),var(--acc3));color:var(--white);box-shadow:0 3px 12px rgba(13,148,136,.25);}
.tb-btn-p:hover{transform:translateY(-1px);}
.tb-btn-g{background:rgba(255,255,255,.06);color:var(--g2);border:1px solid rgba(255,255,255,.08);}
.tb-btn-g:hover{background:rgba(255,255,255,.1);color:var(--white);}
.tb-search{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:6px 12px;}
.tb-search input{background:none;border:none;color:var(--white);font-size:13px;font-family:var(--font);outline:none;width:160px;}
.tb-search input::placeholder{color:var(--g4);}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r3);padding:18px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r3) var(--r3) 0 0;}
.kpi.k-teal::before{background:linear-gradient(90deg,var(--acc),var(--acc2));}
.kpi.k-red::before{background:linear-gradient(90deg,var(--red),#F87171);}
.kpi.k-yellow::before{background:linear-gradient(90deg,var(--yellow),#FCD34D);}
.kpi.k-green::before{background:linear-gradient(90deg,var(--green),#4ADE80);}
.kpi.k-blue::before{background:linear-gradient(90deg,var(--blue),#60A5FA);}
.kpi-label{font-size:10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--g3);margin-bottom:8px;}
.kpi-val{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:3px;}
.kpi-sub{font-size:11px;color:var(--g4);}
.kpi-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:26px;opacity:.12;}

/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.chart-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r3);padding:18px;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:3px;}
.chart-sub{font-size:11px;color:var(--g4);margin-bottom:14px;font-family:var(--mono);}
.chart-wrap{position:relative;height:190px;}

/* TABLE */
.tbl-wrap{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r3);overflow:hidden;}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05);}
.tbl-title{font-size:14px;font-weight:700;}
.tbl-count{font-size:11px;color:var(--g4);font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
thead tr{background:rgba(255,255,255,.02);}
th{padding:9px 14px;text-align:left;font-size:10px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--g4);border-bottom:1px solid rgba(255,255,255,.04);}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.td-num{font-family:var(--mono);font-size:11px;color:var(--g3);}
.td-val{font-family:var(--mono);font-size:12px;font-weight:600;}
.td-val.v-red{color:#F87171;}
.td-val.v-yellow{color:#FCD34D;}
.td-actions{display:flex;gap:5px;white-space:nowrap;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.05em;font-family:var(--mono);}
.b-red{background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2);}
.b-yellow{background:rgba(245,158,11,.1);color:#FCD34D;border:1px solid rgba(245,158,11,.2);}
.b-green{background:rgba(34,197,94,.1);color:#4ADE80;border:1px solid rgba(34,197,94,.2);}
.b-blue{background:rgba(59,130,246,.1);color:#60A5FA;border:1px solid rgba(59,130,246,.2);}
.b-teal{background:rgba(13,148,136,.12);color:var(--acc2);border:1px solid rgba(13,148,136,.25);}
.b-gray{background:rgba(107,125,148,.1);color:var(--g3);border:1px solid rgba(107,125,148,.2);}
.b-orange{background:rgba(249,115,22,.1);color:#FB923C;border:1px solid rgba(249,115,22,.2);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;text-decoration:none;}
.btn-p{background:linear-gradient(135deg,var(--acc),var(--acc3));color:var(--white);}
.btn-p:hover{opacity:.9;}
.btn-r{background:rgba(239,68,68,.1);color:#F87171;border:1px solid rgba(239,68,68,.2);}
.btn-r:hover{background:rgba(239,68,68,.2);}
.btn-g{background:rgba(255,255,255,.05);color:var(--g2);border:1px solid rgba(255,255,255,.08);}
.btn-g:hover{background:rgba(255,255,255,.09);color:var(--white);}
.btn-sm{padding:5px 10px;font-size:11px;}

/* ALERTS */
.alert-list{display:flex;flex-direction:column;gap:8px;}
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r2);font-size:12px;line-height:1.5;}
.alert-red{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);}
.alert-yellow{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);}
.alert-teal{background:rgba(13,148,136,.06);border:1px solid rgba(13,148,136,.15);}
.alert-ic{font-size:15px;flex-shrink:0;}
.alert-title{font-weight:600;margin-bottom:2px;}
.alert-desc{color:var(--g3);}

/* SECTION */
.sec-h{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:14px;}
.sec-h h2{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.sec-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--acc2);margin-bottom:4px;}

/* FILTERS */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2);padding:13px 15px;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-group label{font-size:10px;color:var(--g4);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;}
.filter-bar select,.filter-bar input{background:var(--bg3);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:6px 10px;color:var(--white);font-size:12px;font-family:var(--font);outline:none;}
.filter-bar select option{background:var(--bg3);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:var(--r3);padding:26px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:760px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:rgba(255,255,255,.06);border:none;color:var(--g3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.modal-close:hover{background:rgba(255,255,255,.1);color:var(--white);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.form-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;color:var(--g3);}
.form-group input,.form-group select,.form-group textarea{background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:8px 11px;color:var(--white);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(13,148,136,.5);}
.form-group select option{background:var(--bg3);}
.form-group textarea{resize:vertical;min-height:68px;}
.form-sep{grid-column:1/-1;height:1px;background:rgba(255,255,255,.06);}
.form-sec-title{grid-column:1/-1;font-size:10px;font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;color:var(--acc2);margin-top:4px;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.06);}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--bg3);border-radius:var(--r2);padding:3px;}
.tab-btn{flex:1;padding:8px 12px;border:none;background:none;color:var(--g3);font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border-radius:9px;transition:all .15s;}
.tab-btn.active{background:var(--bg2);color:var(--white);box-shadow:0 2px 8px rgba(0,0,0,.3);}

/* TIMELINE */
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:'';position:absolute;left:8px;top:8px;bottom:8px;width:1px;background:rgba(255,255,255,.08);}
.tl-item{position:relative;margin-bottom:18px;}
.tl-dot{position:absolute;left:-18px;top:4px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg2);}
.tl-dot-teal{background:var(--acc2);}
.tl-dot-red{background:var(--red);}
.tl-date{font-size:10px;font-family:var(--mono);color:var(--g4);margin-bottom:4px;}
.tl-card{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2);padding:12px 13px;}
.tl-type{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--acc2);margin-bottom:4px;}
.tl-desc{font-size:12px;color:var(--g2);line-height:1.5;}
.tl-resp{font-size:11px;color:var(--g4);margin-top:6px;}
.tl-next{font-size:11px;color:var(--yellow);margin-top:4px;}

/* UPLOAD */
.upload-zone{border:2px dashed rgba(13,148,136,.3);border-radius:var(--r2);padding:22px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(13,148,136,.03);}
.upload-zone:hover{border-color:rgba(13,148,136,.6);background:rgba(13,148,136,.06);}
#file-input{display:none;}

/* DOCS */
.doc-list{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
.doc-item{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r);padding:10px 13px;}
.doc-ic{font-size:18px;flex-shrink:0;}
.doc-name{font-size:13px;font-weight:500;flex:1;}
.doc-meta{font-size:11px;color:var(--g4);font-family:var(--mono);}

/* DETAIL INFO */
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.info-item{background:var(--bg3);border:1px solid rgba(255,255,255,.06);border-radius:var(--r2);padding:13px;}
.info-lbl{font-size:10px;font-family:var(--mono);letter-spacing:.07em;text-transform:uppercase;color:var(--g4);margin-bottom:4px;}
.info-val{font-size:13px;font-weight:600;line-height:1.4;}
.info-val.mono{font-family:var(--mono);font-size:12px;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;}
.empty-ic{font-size:36px;margin-bottom:10px;opacity:.35;}
.empty-title{font-size:14px;font-weight:600;color:var(--g2);margin-bottom:5px;}
.empty-desc{font-size:12px;color:var(--g4);}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--bg4);border:1px solid rgba(13,148,136,.35);border-radius:var(--r2);padding:11px 18px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;min-width:220px;}
#toast.show{transform:none;opacity:1;}

/* TWO COLUMN LAYOUT */
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px;}

@media(max-width:1100px){.kpi-grid{grid-template-columns:1fr 1fr;}.chart-row{grid-template-columns:1fr;}.two-col{grid-template-columns:1fr;}}
@media(max-width:800px){#sidebar{display:none;}#content{padding:16px;}.form-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.kpi-grid{grid-template-columns:1fr;}.info-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">⚖</div>
      <div class="sb-logo-name">Passivos<br><small>Gestão Tributária</small></div>
    </div>
    <div class="sb-section">Principal</div>
    <button class="sb-item active" id="nav-dashboard" onclick="App.nav('dashboard')"><span class="sb-ic">⊞</span>Dashboard</button>
    <button class="sb-item" id="nav-clientes" onclick="App.nav('clientes')"><span class="sb-ic">◉</span>Clientes</button>
    <button class="sb-item" id="nav-processos" onclick="App.nav('processos')"><span class="sb-ic">⚖</span>Processos</button>
    <div class="sb-section">Análise</div>
    <button class="sb-item" id="nav-relatorios" onclick="App.nav('relatorios')"><span class="sb-ic">↗</span>Relatórios</button>
    <div class="sb-spacer"></div>
    <div class="sb-bottom">
      <a class="sb-back" href="portal.html">← Voltar ao Portal</a>
    </div>
  </aside>
  <div id="main">
    <div id="topbar">
      <div class="tb-breadcrumb" id="breadcrumb"><span>Dashboard</span></div>
      <div class="tb-spacer"></div>
      <div class="tb-search">
        <span style="color:var(--g4);font-size:13px">🔍</span>
        <input type="text" id="global-search" placeholder="Buscar processo, cliente..." oninput="App.search(this.value)">
      </div>
      <button class="tb-btn tb-btn-g" onclick="App.exportExcel()">⬇ Excel</button>
      <button class="tb-btn tb-btn-g" onclick="App.exportPDF()">📄 PDF</button>
      <button class="tb-btn tb-btn-p" id="topbar-add-btn" onclick="App.add()" style="display:none">+ Novo</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)App.closeModal()">
  <div class="modal modal-lg" id="modal-box"></div>
</div>
<div id="toast"><span id="toast-ic">✓</span> <span id="toast-msg"></span></div>

<script>
const TRIBUTOS=['PIS','COFINS','ICMS','IRPJ','CSLL','INSS','ISS','IPI','Outros'];
const STATUS_LIST=['Em andamento','Aguardando julgamento','Suspenso','Encerrado','Ganho','Perdido'];
const FASES=['Inicial','Instrução','Julgamento','1ª instância','2ª instância','Superior','Execução','Transitado'];
const TIPOS=['Judicial','Administrativo'];
const ESFERAS=['Federal','Estadual','Municipal'];
const RISCOS=['Alto','Médio','Baixo'];
const TIPOS_AND=['Despacho','Decisão','Sentença','Acórdão','Petição inicial','Recurso','Embargos','Penhora','Citação','Outro'];
const TIPOS_DOC=['Petição','Decisão','Sentença','Acórdão','Procuração','Comprovante','Contrato','Outro'];
const SEGMENTOS=['Transporte','Logística','Indústria','Comércio','Serviços','Agronegócio','Tecnologia','Outro'];

const fmt={
  brl:v=>v==null||v===''?'—':parseFloat(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}),
  dt:s=>s?new Date(s+'T12:00').toLocaleDateString('pt-BR'):'—',
  id:()=>Math.random().toString(36).slice(2,9),
};

const App=(()=>{
  let state={view:'dashboard',detailId:null,detailTab:0,searchQ:'',filters:{cliente:'',tributo:'',status:'',risco:'',tipo:''},clientes:[],processos:[],andamentos:[],documentos:[]};
  let _charts={};

  function save(){localStorage.setItem('passivos_v1',JSON.stringify({clientes:state.clientes,processos:state.processos,andamentos:state.andamentos,documentos:state.documentos}));}

  function load(){
    const raw=localStorage.getItem('passivos_v1');
    if(raw){const d=JSON.parse(raw);state.clientes=d.clientes||[];state.processos=d.processos||[];state.andamentos=d.andamentos||[];state.documentos=d.documentos||[];}
    else loadDemo();
  }

  function loadDemo(){
    state.clientes=[

  function nav(view,opts={}){
    Object.values(_charts).forEach(c=>{if(c)c.destroy();});
    _charts={};
    state.view=view;state.detailId=opts.id||null;state.detailTab=opts.tab||0;
    document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
    const navEl=document.getElementById('nav-'+view);if(navEl)navEl.classList.add('active');
    const labels={dashboard:'Dashboard',clientes:'Clientes',processos:'Processos',relatorios:'Relatórios',detalhe:'Processo'};
    document.getElementById('breadcrumb').innerHTML=`<span>${labels[view]||view}</span>`;
    const addLabels={dashboard:'',clientes:'+ Cliente',processos:'+ Processo',relatorios:'',detalhe:''};
    const addBtn=document.getElementById('topbar-add-btn');
    if(addLabels[view]){addBtn.style.display='';addBtn.textContent=addLabels[view];}else{addBtn.style.display='none';}
    render();
  }

  function search(q){state.searchQ=q;render();}
  function add(){if(state.view==='clientes')openClienteModal();else if(state.view==='processos')openProcessoModal();}

  function render(){
    const c=document.getElementById('content');
    if(state.view==='dashboard'){c.innerHTML=renderDashboard();initDashboardCharts();}
    else if(state.view==='clientes')c.innerHTML=renderClientes();
    else if(state.view==='processos')c.innerHTML=renderProcessos();
    else if(state.view==='detalhe')c.innerHTML=renderDetalhe();
    else if(state.view==='relatorios')c.innerHTML=renderRelatorios();
  }

  /* ── FILTROS COMPARTILHADOS ── */
  function getFilteredPs(){
    let ps=state.processos;const f=state.filters;
    if(f.cliente)ps=ps.filter(p=>p.clienteId===f.cliente);
    if(f.tributo)ps=ps.filter(p=>p.tributo===f.tributo);
    if(f.status)ps=ps.filter(p=>p.status===f.status);
    if(f.risco)ps=ps.filter(p=>p.risco===f.risco);
    if(f.tipo)ps=ps.filter(p=>p.tipo===f.tipo);
    if(state.searchQ)ps=ps.filter(p=>p.numero.includes(state.searchQ)||(p.objeto||'').toLowerCase().includes(state.searchQ.toLowerCase())||(nomeCliente(p.clienteId)||'').toLowerCase().includes(state.searchQ.toLowerCase()));
    return ps;
  }

  function renderFilterBar(){
    const f=state.filters;
    const clOpts=state.clientes.map(c=>`<option value="${c.id}" ${f.cliente===c.id?'selected':''}>${c.razaoSocial}</option>`).join('');
    const tribOpts=TRIBUTOS.map(t=>`<option value="${t}" ${f.tributo===t?'selected':''}>${t}</option>`).join('');
    const statusOpts=STATUS_LIST.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('');
    const riscoOpts=RISCOS.map(r=>`<option value="${r}" ${f.risco===r?'selected':''}>${r}</option>`).join('');
    const active=Object.values(f).filter(v=>v).length;
    return `<div class="filter-bar">
      <div class="filter-group"><label>Cliente</label><select onchange="App.setFilter('cliente',this.value)"><option value="">Todos</option>${clOpts}</select></div>
      <div class="filter-group"><label>Tributo</label><select onchange="App.setFilter('tributo',this.value)"><option value="">Todos</option>${tribOpts}</select></div>
      <div class="filter-group"><label>Status</label><select onchange="App.setFilter('status',this.value)"><option value="">Todos</option>${statusOpts}</select></div>
      <div class="filter-group"><label>Risco</label><select onchange="App.setFilter('risco',this.value)"><option value="">Todos</option>${riscoOpts}</select></div>
      <div class="filter-group"><label>Tipo</label><select onchange="App.setFilter('tipo',this.value)"><option value="">Todos</option><option value="Judicial" ${f.tipo==='Judicial'?'selected':''}>Judicial</option><option value="Administrativo" ${f.tipo==='Administrativo'?'selected':''}>Administrativo</option></select></div>
      <button class="btn btn-g btn-sm" onclick="App.clearFilters()" style="align-self:flex-end">✕ Limpar${active?` (${active})`:''}
      </button>
    </div>`;
  }

  function initDashboardCharts(){
    const ps=getFilteredPs();
    const tribMap={};
    ps.forEach(p=>{const v=parseFloat(p.valorAtualizado)||0;tribMap[p.tributo]=(tribMap[p.tributo]||0)+v;});
    const tribLabels=Object.keys(tribMap);const tribData=tribLabels.map(k=>tribMap[k]);
    const colors=['#0D9488','#3B82F6','#F59E0B','#EF4444','#8B5CF6','#22C55E','#F97316','#EC4899','#06B6D4'];
    const ctx1=document.getElementById('ch-tributo');
    if(ctx1){_charts.tributo=new Chart(ctx1,{type:'doughnut',data:{labels:tribLabels,datasets:[{data:tribData,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#A8B8CC',font:{size:10,family:'JetBrains Mono'},boxWidth:10,padding:8}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt.brl(ctx.raw)}`}}},cutout:'65%'}});}
    const riscos={Alto:0,Médio:0,Baixo:0};ps.forEach(p=>riscos[p.risco]=(riscos[p.risco]||0)+1);
    const ctx2=document.getElementById('ch-risco');
    if(ctx2){_charts.risco=new Chart(ctx2,{type:'bar',data:{labels:['Alto','Médio','Baixo'],datasets:[{data:[riscos['Alto'],riscos['Médio'],riscos['Baixo']],backgroundColor:['rgba(239,68,68,.7)','rgba(245,158,11,.7)','rgba(34,197,94,.7)'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} processo${ctx.parsed.y!==1?'s':''}`}}},scales:{x:{ticks:{color:'#6B7D94',font:{size:11}},grid:{display:false}},y:{ticks:{color:'#6B7D94',font:{size:11},stepSize:1},grid:{color:'rgba(255,255,255,.04)'},beginAtZero:true}}}});}
  }

  function gerarAlertas(ps){
    const alerts=[];ps=ps||getFilteredPs();
    const altos=ps.filter(p=>p.risco==='Alto');
    if(altos.length)alerts.push({tipo:'red',ic:'🔴',title:`${altos.length} processo${altos.length>1?'s':''} de alto risco`,desc:altos.map(p=>truncNum(p.numero,20)).join(' · ')});
    const semGarantia=ps.filter(p=>(!p.garantias||p.garantias==='Sem garantia')&&p.risco!=='Baixo');
    if(semGarantia.length)alerts.push({tipo:'yellow',ic:'⚠',title:`${semGarantia.length} processo${semGarantia.length>1?'s':''} sem garantia`,desc:'Verificar necessidade de garantia processual'});
    const semAnd=ps.filter(p=>!state.andamentos.find(a=>a.processoId===p.id));
    if(semAnd.length)alerts.push({tipo:'yellow',ic:'🟡',title:`${semAnd.length} processo${semAnd.length>1?'s':''} sem andamento registrado`,desc:'Processos sem nenhuma movimentação cadastrada'});
    return alerts.slice(0,4);
  }

  /* ── EXPORT ── */
  function exportExcel(){
    if(typeof XLSX==='undefined'){toast('Biblioteca XLSX não carregada','⚠');return;}
    const wb=XLSX.utils.book_new();
    const ps=getFilteredPs();
    const psData=ps.map(p=>({'Número':p.numero,'Cliente':nomeCliente(p.clienteId),'Tipo':p.tipo,'Esfera':p.esfera,'Tribunal':p.tribunal,'Vara':p.vara,'Data Distribuição':fmt.dt(p.dataDistribuicao),'Status':p.status,'Fase':p.fase,'Tributo':p.tributo,'Valor Original':parseFloat(p.valorOriginal)||0,'Valor Atualizado':parseFloat(p.valorAtualizado)||0,'Multa':parseFloat(p.multa)||0,'Juros':parseFloat(p.juros)||0,'Depósitos':parseFloat(p.depositos)||0,'Risco':p.risco,'Garantias':p.garantias,'Objeto':p.objeto}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(psData),'Processos');
    const clData=state.clientes.map(c=>({'Razão Social':c.razaoSocial,'CNPJ':c.cnpj,'Grupo':c.grupo,'Responsável':c.responsavel,'Segmento':c.segmento,'Status':c.status}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(clData),'Clientes');
    const psIds=new Set(ps.map(p=>p.id));
    const andData=state.andamentos.filter(a=>psIds.has(a.processoId)).map(a=>({'Processo':(state.processos.find(p=>p.id===a.processoId)||{}).numero||'','Data':fmt.dt(a.data),'Tipo':a.tipo,'Responsável':a.responsavel,'Observações':a.obs,'Próximo Passo':a.proximo}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(andData),'Andamentos');
    XLSX.writeFile(wb,`Passivos_Tributarios_${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('Excel gerado com sucesso');
  }

  function exportPDF(){
    if(typeof window.jspdf==='undefined'){toast('jsPDF não carregado','⚠');return;}
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
    doc.setFillColor(6,13,26);doc.rect(0,0,297,210,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont('helvetica','bold');
    doc.text('Relatório de Passivos Tributários',14,18);
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(107,125,148);
    doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')} — Rumo Brasil Consultoria`,14,24);
    const ps=getFilteredPs();const totalVal=ps.reduce((s,p)=>s+(parseFloat(p.valorAtualizado)||0),0);
    doc.setFontSize(11);doc.setTextColor(13,148,136);
    doc.text(`Total em discussão: R$ ${totalVal.toLocaleString('pt-BR')}`,14,33);
    doc.setTextColor(200,200,200);
    doc.text(`Processos: ${ps.length}   Clientes: ${state.clientes.length}   Alto risco: ${ps.filter(p=>p.risco==='Alto').length}   Judiciais: ${ps.filter(p=>p.tipo==='Judicial').length}`,14,40);
    doc.autoTable({startY:47,head:[['Processo','Cliente','Tipo','Tributo','Valor Atualizado','Risco','Status']],body:ps.map(p=>[truncNum(p.numero,22),nomeCliente(p.clienteId).slice(0,22),p.tipo,p.tributo,`R$ ${(parseFloat(p.valorAtualizado)||0).toLocaleString('pt-BR')}`,p.risco,p.status]),theme:'grid',styles:{fontSize:8,textColor:[200,200,200],fillColor:[12,22,37]},headStyles:{fillColor:[13,148,136],textColor:[255,255,255],fontStyle:'bold'},alternateRowStyles:{fillColor:[18,32,53]}});
    doc.save(`Passivos_Tributarios_${new Date().toISOString().slice(0,10)}.pdf`);
    toast('PDF gerado com sucesso');
  }

  /* ── HELPERS ── */
  function showModal(html,large=false){
    document.getElementById('modal-box').className=large?'modal modal-lg':'modal';
    document.getElementById('modal-box').innerHTML=html;
    document.getElementById('modal-overlay').classList.add('open');
  }
  function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
  function toast(msg,ic='✓'){
    const el=document.getElementById('toast');
    document.getElementById('toast-msg').textContent=msg;document.getElementById('toast-ic').textContent=ic;
    el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);
  }
  function nomeCliente(id){const c=state.clientes.find(c=>c.id===id);return c?c.razaoSocial:'—';}
  function truncNum(n,max=22){return n&&n.length>max?n.slice(0,max)+'…':(n||'—');}
  function badgeRisco(r){const m={Alto:'b-red',Médio:'b-yellow',Baixo:'b-green'};return`<span class="badge ${m[r]||'b-gray'}">${r||'—'}</span>`;}
  function badgeStatus(s){const m={'Em andamento':'b-blue','Aguardando julgamento':'b-yellow','Suspenso':'b-gray','Encerrado':'b-gray','Ganho':'b-green','Perdido':'b-red'};return`<span class="badge ${m[s]||'b-gray'}">${s||'—'}</span>`;}
  function riscoCls(r){return r==='Alto'?'v-red':r==='Médio'?'v-yellow':'';}
  function docIcon(t){return{Petição:'📄',Decisão:'⚖',Sentença:'📋',Acórdão:'📗',Procuração:'📜',Comprovante:'🧾',Contrato:'📝'}[t]||'📎';}
  function formatSize(b){if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}

  function init(){load();nav('dashboard');}

  return{nav,search,add,setFilter,clearFilters,filtrarPorCliente,saveCliente,editCliente,deleteCliente,openClienteModal,saveProcesso,editProcesso,deleteProcesso,openProcessoModal,saveAndamento,openAndamentoModal,deleteAndamento,saveDoc,openDocModal,handleFiles,deleteDoc,closeModal,exportExcel,exportPDF};
})();

document.addEventListener('DOMContentLoaded',App.init);
</script>
</body>
